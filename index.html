<style>
  :root {
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --green: #0F6E56;
    --green-light: #E1F5EE;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --gray: #5F5E5A;
    --gray-light: #F1EFE8;
    --text: #1a1a1a;
    --text-sub: #6b6b6b;
    --text-hint: #9b9b9b;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg2); color: var(--text); font-size: 16px; min-height: 100vh; }

  .app { max-width: 680px; margin: 0 auto; padding: 0 0 80px; }

  /* ヘッダー */
  .header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 16px 10px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header-title { font-size: 18px; font-weight: 600; color: var(--blue-dark); }
  .header-sub { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
  .sync-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: var(--green-light); color: var(--green); font-weight: 500; }
  .sync-badge.offline { background: var(--red-light); color: var(--red); }

  /* ナビ */
  .nav { display: flex; background: var(--bg); border-bottom: 0.5px solid var(--border); }
  .nav-btn { flex: 1; padding: 12px 4px; border: none; background: transparent; font-size: 13px; color: var(--text-sub); cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

  /* コンテンツ */
  .content { padding: 16px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-hint); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 8px; }

  /* カード */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }

  /* 生徒グリッド */
  .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .s-btn { padding: 10px 6px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg); cursor: pointer; text-align: center; font-size: 13px; color: var(--text); transition: all 0.15s; min-height: 56px; font-family: inherit; }
  .s-btn:active { transform: scale(0.96); }
  .s-btn.active { border: 2px solid var(--blue); background: var(--blue-light); color: var(--blue-dark); font-weight: 600; }
  .s-btn .grade { font-size: 11px; color: var(--text-hint); margin-top: 3px; }
  .s-btn.active .grade { color: var(--blue); }

  /* 科目行 */
  .subject-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .subject-row:last-child { border-bottom: none; }
  .subj-name { width: 42px; font-size: 13px; font-weight: 600; color: var(--text); flex-shrink: 0; padding-top: 7px; }
  .unit-wrap { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .u-btn { padding: 6px 12px; border-radius: 20px; border: 0.5px solid var(--border-md); background: transparent; cursor: pointer; font-size: 13px; color: var(--text-sub); transition: all 0.15s; font-family: inherit; }
  .u-btn:active { transform: scale(0.94); }
  .u-btn.toku { background: var(--green-light); border-color: var(--green); color: #085041; font-weight: 600; }
  .u-btn.nigate { background: var(--red-light); border-color: var(--red); color: #791F1F; font-weight: 600; }
  .u-btn.futsuu { background: var(--gray-light); border-color: var(--gray); color: #444441; }

  /* タグ */
  .tag { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 12px; margin: 2px; }
  .tag.toku { background: var(--green-light); color: #085041; }
  .tag.niga { background: var(--red-light); color: #791F1F; }

  /* ボタン */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 20px; border-radius: var(--radius); font-size: 14px; cursor: pointer; font-weight: 600; font-family: inherit; border: none; transition: all 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn-blue { background: var(--blue); color: #fff; }

  .btn-green { background: var(--green); color: #fff; }

  .btn-red { background: var(--red-light); color: var(--red); border: 0.5px solid var(--red); }
  .btn-outline { background: transparent; color: var(--text-sub); border: 0.5px solid var(--border-md); }

  .btn-purple:active { background: #3C3489; }

  /* プリントカード */
  .print-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.15s; }
  .print-card:active { transform: scale(0.98); }
  .print-card.selected { border: 2px solid var(--purple); background: var(--purple-light); }
  .pc-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--purple-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pc-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .pc-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .print-card.selected .pc-name { color: #3C3489; }
  .match-badge { font-size: 11px; background: var(--green-light); color: var(--green); padding: 2px 7px; border-radius: 10px; margin-left: 6px; font-weight: 600; }

  /* フォーム */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  input[type=text], select, textarea {
    width: 100%; padding: 11px 13px; border: 0.5px solid var(--border-md); border-radius: var(--radius);
    font-size: 14px; color: var(--text); background: var(--bg); font-family: inherit;
    appearance: none; -webkit-appearance: none;
  }
  input[type=text]:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }
  textarea { resize: none; height: 60px; }
  input[type=file] { font-size: 13px; color: var(--text-sub); padding: 8px 0; }

  /* トースト */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }

  /* ローディング */
  .loading { text-align: center; padding: 40px; color: var(--text-hint); font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 32px; color: var(--text-hint); font-size: 14px; }
  .legend { display: flex; gap: 12px; font-size: 12px; color: var(--text-hint); flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .filter-btn { padding: 6px 13px; border-radius: 20px; border: 0.5px solid var(--border-md); background: transparent; cursor: pointer; font-size: 13px; color: var(--text-sub); font-family: inherit; transition: all 0.15s; }
  .filter-btn:active { transform: scale(0.95); }
  .filter-active-red { background: var(--red-light); border-color: var(--red); color: #791F1F; font-weight: 600; }
  .filter-active-green { background: var(--green-light); border-color: var(--green); color: #085041; font-weight: 600; }
  .filter-active-blue { background: var(--blue-light); border-color: var(--blue); color: var(--blue-dark); font-weight: 600; }

  .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--blue-light); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--blue-dark); flex-shrink: 0; }

  /* 印刷エリア */
  .print-action { margin-top: 16px; padding: 16px; background: var(--purple-light); border-radius: var(--radius-lg); }
  .print-action-title { font-size: 13px; color: #3C3489; font-weight: 600; margin-bottom: 10px; }

  .slot-header { font-size:15px; font-weight:600; color:var(--blue-dark); }

  @media (max-width: 400px) {
    .form-grid { grid-template-columns: 1fr; }
    .student-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  }
</style>

function getUnitsForGrade(subject, grade) {

// ===== DB操作 =====
async function loadStudents() {
  const { data, error } = await sb.from('students').select('*').order('created_at');
  if (error) throw error;
  students = data || [];
}

async function loadSkills(studentId) {
  if (skillCache[studentId]) return skillCache[studentId];
  try {
    const { data, error } = await sb.from('skill_records').select('*').eq('student_id', studentId);
    if (error) throw error;
    const map = {};
    (data || []).forEach(r => {
      if (!map[r.subject]) map[r.subject] = {};
      if (r.unit === '__memo') map.__memo = r.status;
      else map[r.subject][r.unit] = r.status;
    });
    skillCache[studentId] = map;
    return map;
  } catch(e) {
    console.error('loadSkills error:', e);
    skillCache[studentId] = {};
    return {};
  }
}

async function saveSkill(studentId, subject, unit, status) {
  if (!skillCache[studentId]) skillCache[studentId] = {};
  if (!skillCache[studentId][subject]) skillCache[studentId][subject] = {};
  skillCache[studentId][subject][unit] = status;

  const { data: existing } = await sb.from('skill_records').select('id')
    .eq('student_id', studentId).eq('subject', subject).eq('unit', unit);
  if (existing && existing.length > 0) {
    await sb.from('skill_records').update({ status, updated_at: new Date().toISOString() }).eq('id', existing[0].id);
  } else {
    await sb.from('skill_records').insert({ student_id: studentId, subject, unit, status });
  }
}

async function saveMemo(studentId, memo) {
  if (!skillCache[studentId]) skillCache[studentId] = {};
  skillCache[studentId].__memo = memo;
  const { data: existing } = await sb.from('skill_records').select('id')
    .eq('student_id', studentId).eq('subject', '__memo').eq('unit', '__memo');
  if (existing && existing.length > 0) {
    await sb.from('skill_records').update({ status: memo, updated_at: new Date().toISOString() }).eq('id', existing[0].id);
  } else {
    await sb.from('skill_records').insert({ student_id: studentId, subject: '__memo', unit: '__memo', status: memo });
  }
}

let printHistory = [];

  printHistory = data || [];
}
async function loadClassSlots() {
  try {
    const { data } = await sb.from('class_slots').select('*');
    classSlots = data || [];
  } catch(e) { classSlots = []; }
}

async function toggleClassSlot(studentId, day, slot) {
  // 既に同じコマがあればOFF、なければON（複数コマ対応）
  const existing = classSlots.find(c => c.student_id === studentId && c.day_of_week === day && c.time_slot === slot);
  if (existing) {
    await sb.from('class_slots').delete().eq('id', existing.id);
    classSlots = classSlots.filter(c => c.id !== existing.id);
  } else {
    const { data } = await sb.from('class_slots').insert({student_id: studentId, day_of_week: day, time_slot: slot}).select().single();
    if (data) classSlots.push(data);
  }
}

async function saveClassSlot(studentId, day, slot) {
  await toggleClassSlot(studentId, day, slot);
}

function getSlotsForStudent(studentId) {
  return classSlots.filter(c => c.student_id === studentId);
}

function getSlotForStudent(studentId) {
  return classSlots.find(c => c.student_id === studentId);
}

function getStudentsInSlot(day, slot) {
  const ids = classSlots.filter(c => c.day_of_week === day && c.time_slot === slot).map(c => c.student_id);
  return students.filter(s => ids.includes(s.id));
}

function getUnassignedStudents() {
  const assigned = classSlots.map(c => c.student_id);
  return students.filter(s => !assigned.includes(s.id));
}

function getHistoryForStudent(studentId, printId) {
  return printHistory.filter(h => h.student_id === studentId && h.print_id === printId);
}
async function recordPrintHistory(studentId, printIds) {
  const rows = printIds.map(pid => ({ student_id: studentId, print_id: pid, printed_at: new Date().toISOString().split('T')[0] }));
  await sb.from('print_history').insert(rows);
  await loadPrintHistory();
}

  });
  ['schedule','karte','dashboard','print','students'].forEach(id => {
    document.getElementById('tab-'+id).style.display = (id === t) ? '' : 'none';
  });
  if (t === 'schedule') renderSchedule();
  if (t === 'karte') renderKarte();
  if (t === 'dashboard') renderDashboard();
  if (t === 'print') await renderPrintTab();
  if (t === 'students') renderStudentsTab();
}

    }

  const unassigned = students.filter(s => getSlotsForStudent(s.id).length === 0);
  if (unassigned.length) {
    html += '<div class="section-label">コマ未設定の生徒（' + unassigned.length + '名）</div><div class="card">';

async function openStudentPrintPage(studentId) {
  const s = students.find(x => x.id === studentId);
  if (!s) return;
  const el = document.getElementById('tab-schedule');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>読み込み中...</div>';

  // スキル・履歴読み込み
  const skills = await loadSkills(studentId);
  const subjects = GRADE_SUBJECTS[s.grade] || [];

  // 苦手単元
  let nigates = [];
  subjects.forEach(sub => {
    (getUnitsForGrade(sub, s.grade)||[]).forEach(u => {
      if (skills[sub]?.[u] === 'nigate') nigates.push({sub, u});
    });
  });

  // 苦手にマッチするプリント
  const matchedPrints = prints.filter(p => {
    const units = (window._printUnitsCache||[]).filter(x => x.print_id === p.id).map(x => x.unit);
    return nigates.some(n => n.sub === p.subject && (units.includes(n.u) || p.unit === n.u));
  });

  // 印刷履歴（この生徒のみ）
  const history = printHistory.filter(h => h.student_id === studentId);

  let selectedForPrint = [];

  function render() {
    let html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
    html += '<button data-action="back-schedule" style="font-size:13px;padding:6px 12px;border:0.5px solid var(--border-md);border-radius:var(--radius);background:transparent;cursor:pointer;font-family:inherit">← 戻る</button>';
    html += '<div style="font-size:17px;font-weight:600">' + s.name + ' <span style="font-size:13px;font-weight:400;color:var(--text-hint)">' + s.grade + '</span></div>';
    html += '</div>';

    // 苦手プリント
    html += '<div class="section-label">苦手に合うプリント</div>';
    if (!matchedPrints.length) {
      html += '<div style="padding:12px;color:var(--text-hint);font-size:14px;background:var(--bg);border-radius:var(--radius);margin-bottom:16px">まだプリントが登録されていません</div>';
    } else {
      html += '<div style="margin-bottom:16px">';
      matchedPrints.forEach(p => {
        const sel = selectedForPrint.includes(p.id);
        const hist = printHistory.filter(h => h.student_id === studentId && h.print_id === p.id);
        const lastDate = hist.length ? hist[0].printed_at : null;
        html += '<div data-action="toggle-sel" data-id="' + p.id + '" class="print-card ' + (sel?'selected':'') + '" style="margin-bottom:8px;cursor:pointer">';
        html += '<div class="pc-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + (sel?'#534AB7':'#888780') + '" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>';
        html += '<div style="flex:1;min-width:0">';
        html += '<div class="pc-name">' + p.unit;
        if (lastDate) html += '<span style="font-size:11px;background:#FAEEDA;color:#633806;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:600">渡済 ' + lastDate.slice(5).replace('-','/') + (hist.length>1?' (計'+hist.length+'回)':'') + '</span>';
        html += '</div>';
        html += '<div class="pc-sub">' + p.book + ' / ' + p.subject + '</div>';
        html += '</div>';
        if (sel) html += '<div style="color:var(--purple);font-size:18px">✓</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    // 印刷ボタン
    if (selectedForPrint.length) {
      html += '<button data-action="do-print-now" style="width:100%;padding:14px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:20px">🖨 ' + selectedForPrint.length + '枚を印刷する</button>';
    }

    // 印刷履歴
    html += '<div class="section-label">印刷履歴</div>';
    if (!history.length) {
      html += '<div style="padding:12px;color:var(--text-hint);font-size:14px;background:var(--bg);border-radius:var(--radius)">まだ印刷履歴がありません</div>';
    } else {
      html += '<div class="card">';
      const sorted = [...history].sort((a,b) => b.printed_at.localeCompare(a.printed_at));
      sorted.forEach(h => {
        const p = prints.find(x => x.id === h.print_id);
        html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)">';
        html += '<div style="font-size:12px;color:var(--text-hint);min-width:48px">' + h.printed_at.slice(5).replace('-','/') + '</div>';
        html += '<div style="flex:1;font-size:14px">' + (p ? p.unit : '削除済み') + '</div>';
        html += '<div style="font-size:12px;color:var(--text-hint)">' + (p ? p.book : '') + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    el.innerHTML = html;

    el.onclick = async function(e) {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      const action = t.dataset.action;
      if (action === 'back-schedule') { renderSchedule(); return; }
      if (action === 'toggle-sel') {
        const idx = selectedForPrint.indexOf(t.dataset.id);
        if (idx >= 0) selectedForPrint.splice(idx,1); else selectedForPrint.push(t.dataset.id);
        render();
      }
      if (action === 'do-print-now') {
        const targets = prints.filter(p => selectedForPrint.includes(p.id));
        await doPrintTargets(targets, studentId, selectedForPrint);
        selectedForPrint = [];
        render();
      }
    };
  }

  render();
}

async function doPrintTargets(targets, studentId, printIds) {
  console.log('doPrintTargets called', targets.length, 'targets:', JSON.stringify(targets.map(p=>({id:p.id,unit:p.unit,file_url:p.file_url,file_name:p.file_name}))));
  const withFile = targets.filter(p => p.file_url || p.file_name);
  console.log('withFile:', withFile.length);
  if (!withFile.length) {
    toast('PDFファイルが登録されていません');
    return;
  }
  for (const p of withFile) {
    try {
      let printUrl = p.file_url;
      console.log('printUrl:', printUrl);
      // 古いfile_data形式の場合はfetch
      if (!printUrl && p.file_name) {
        const { data } = await sb.from('prints').select('file_url,file_data').eq('id', p.id).single();
        printUrl = data?.file_url;
        if (!printUrl && data?.file_data) {
          const base64 = data.file_data.split(',')[1];
          const mime = data.file_data.split(';')[0].split(':')[1];
          const binary = atob(base64);
          const bytes = new Uint8Array(binary.length);
          for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
          const blob = new Blob([bytes], { type: mime });
          printUrl = URL.createObjectURL(blob);
        }
      }
      if (!printUrl) continue;
      // iPhoneを含む全ブラウザ対応：PDFのURLを直接開く
      const win = window.open(printUrl, '_blank');
      if (!win) { toast('ポップアップを許可してください'); break; }
      await new Promise(r => setTimeout(r, 800));
    } catch(e) { console.error(e); toast('印刷エラー: ' + e.message); }
  }
  if (studentId) await recordPrintHistory(studentId, printIds);
  toast('印刷ダイアログを開いています...');
}

async function renderDashboard() {

  el.innerHTML = `<div class="loading"><span class="spinner"></span>全生徒のデータを読み込み中...</div>`;

  if (!students.length) {

    return;
  }

  // 全生徒のスキルを並行取得
  await Promise.all(students.map(s => loadSkills(s.id)));

  // フィルター状態
  const filterSubject = window._dashFilterSubject || '';
  const filterType = window._dashFilterType || 'nigate';

  // 科目フィルターUI
  const allSubjects = Object.keys(SUBJECT_UNITS);
  let html = `
  <div style="margin-bottom:14px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <button class="filter-btn ${filterType==='nigate'?'filter-active-red':''}" onclick="setDashFilter('type','nigate')">苦手のみ</button>
      <button class="filter-btn ${filterType==='toku'?'filter-active-green':''}" onclick="setDashFilter('type','toku')">得意のみ</button>
      <button class="filter-btn ${filterType==='both'?'filter-active-blue':''}" onclick="setDashFilter('type','both')">両方</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="filter-btn ${filterSubject===''?'filter-active-blue':''}" onclick="setDashFilter('subject','')">全科目</button>
      ${allSubjects.map(s=>`<button class="filter-btn ${filterSubject===s?'filter-active-blue':''}" onclick="setDashFilter('subject','${s}')">${s}</button>`).join('')}
    </div>
  </div>`;

  // 生徒カード一覧
  let hasAny = false;
  students.forEach(s => {
    const skills = skillCache[s.id] || {};
    const subjects = GRADE_SUBJECTS[s.grade] || [];
    let tokus = [], nigates = [];

    subjects.forEach(sub => {
      if (filterSubject && sub !== filterSubject) return;
      (getUnitsForGrade(sub, s.grade)||[]).forEach(u => {
        const st = skills[sub]?.[u];
        if (st === 'toku') tokus.push({sub, u});
        if (st === 'nigate') nigates.push({sub, u});
      });
    });

    const showToku = (filterType === 'toku' || filterType === 'both') && tokus.length > 0;
    const showNigate = (filterType === 'nigate' || filterType === 'both') && nigates.length > 0;
    if (!showToku && !showNigate) return;
    hasAny = true;

    html += `<div class="card" style="margin-bottom:10px;cursor:pointer" onclick="jumpToStudent('${s.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar">${s.name.slice(-1)}</div>
          <div>
            <div style="font-size:15px;font-weight:600">${s.name}</div>
            <div style="font-size:12px;color:var(--text-sub)">${s.grade}</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text-hint)">タップで編集 →</div>
      </div>`;

    if (showNigate) {
      html += `<div style="margin-bottom:${showToku?'8px':'0'}">
        <div style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:5px">苦手 (${nigates.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${nigates.map(x=>`<span class="tag niga">${x.sub}：${x.u}</span>`).join('')}
        </div>
      </div>`;
    }
    if (showToku) {
      html += `<div>
        <div style="font-size:11px;font-weight:600;color:var(--green);margin-bottom:5px">得意 (${tokus.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${tokus.map(x=>`<span class="tag toku">${x.sub}：${x.u}</span>`).join('')}
        </div>
      </div>`;
    }
    html += `</div>`;
  });

  if (!hasAny) {
    html += `<div class="empty">該当するデータがありません。<br>カルテタブで苦手・得意を記録してください。</div>`;
  }

  el.innerHTML = html;
}

async function renderKarte() {

      el.innerHTML = html + `<div class="loading"><span class="spinner"></span>読み込み中...</div>`;

      const subjects = GRADE_SUBJECTS[s.grade] || [];

      let skillHtml = `<div class="card">

            <span><span class="dot" style="background:#1D9E75"></span>得意</span>
            <span><span class="dot" style="background:#E24B4A"></span>苦手</span>
            <span><span class="dot" style="background:#888780"></span>普通</span>
          </div>
        </div>`;
      subjects.forEach(sub => {
        const units = getUnitsForGrade(sub, s.grade);
        if (!units.length) return;
        skillHtml += `<div class="subject-row"><div class="subj-name">${sub}</div><div class="unit-wrap">`;
        units.forEach(u => {
          const st = skills[sub]?.[u] || null;
          const cls = st === 'toku' ? 'toku' : st === 'nigate' ? 'nigate' : st === 'futsuu' ? 'futsuu' : '';
          skillHtml += `<button class="u-btn ${cls}" onclick="cycleUnit('${s.id}','${sub}','${u}')">${u}</button>`;

      });
      skillHtml += `<div style="margin-top:12px">
        <div class="section-label" style="margin-bottom:4px">メモ</div>
        <textarea id="memo-area" placeholder="授業の様子・保護者連絡など">${skills.__memo||''}</textarea>
      </div></div>`;

      // サマリ
      let tokus = [], nigates = [];
      subjects.forEach(sub => {
        (getUnitsForGrade(sub, s.grade)||[]).forEach(u => {
          const st = skills[sub]?.[u];
          if (st==='toku') tokus.push(sub+'：'+u);
          if (st==='nigate') nigates.push(sub+'：'+u);
        });
      });
      if (tokus.length || nigates.length) {
        skillHtml += `<div class="card" style="margin-bottom:12px">`;
        if (tokus.length) skillHtml += `<div style="margin-bottom:8px"><div style="font-size:12px;color:var(--green);margin-bottom:4px;font-weight:600">得意 (${tokus.length})</div>${tokus.map(t=>`<span class="tag toku">${t}</span>`).join('')}</div>`;
        if (nigates.length) skillHtml += `<div><div style="font-size:12px;color:var(--red);margin-bottom:4px;font-weight:600">苦手 (${nigates.length})</div>${nigates.map(t=>`<span class="tag niga">${t}</span>`).join('')}</div>`;
        skillHtml += `</div>`;
      }

      skillHtml += `<div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-blue" onclick="saveKarte()">保存する</button>
        <button class="btn btn-green" onclick="goToPrint()">プリントを選ぶ →</button>

      // 再描画（生徒ボタン含む）

      el.innerHTML = fullHtml;
    }

  }

async function cycleUnit(sid, sub, unit) {
  const skills = await loadSkills(sid);
  const cur = skills[sub]?.[unit] || null;
  const next = cur === null ? 'toku' : cur === 'toku' ? 'nigate' : cur === 'nigate' ? 'futsuu' : null;
  await saveSkill(sid, sub, unit, next);
  await renderKarte();
}

async function saveKarte() {
  const memo = document.getElementById('memo-area')?.value || '';
  await saveMemo(selectedStudent, memo);
  toast('保存しました ✓');
}

async function goToPrint() {
  await saveKarte();
  showTab('print');
}

// ===== プリントタブ =====
// フォルダナビ状態
let printNav = { book: null, grade: null, subject: null };

async function renderPrintTab() {
  const el = document.getElementById('tab-print');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>読み込み中...</div>';

  try {
    const books = ['ひとつひとつわかりやすく', 'ちびむす'];
    const grades = Object.keys(GRADE_SUBJECTS).filter(g => g.startsWith('中'));

    // パンくずナビ
    let breadcrumb = '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:16px;font-size:13px">';
    breadcrumb += '<span data-action="nav-root" style="color:var(--blue);cursor:pointer;font-weight:600">プリント</span>';
    if (printNav.book) {
      breadcrumb += '<span style="color:var(--text-hint)">›</span>';
      breadcrumb += '<span data-action="nav-book" style="color:var(--blue);cursor:pointer;font-weight:600">' + printNav.book + '</span>';
    }
    if (printNav.grade) {
      breadcrumb += '<span style="color:var(--text-hint)">›</span>';
      breadcrumb += '<span data-action="nav-grade" style="color:var(--blue);cursor:pointer;font-weight:600">' + printNav.grade + '</span>';
    }
    if (printNav.subject) {
      breadcrumb += '<span style="color:var(--text-hint)">›</span>';
      breadcrumb += '<span style="color:var(--text-primary);font-weight:600">' + printNav.subject + '</span>';
    }
    breadcrumb += '</div>';

    let html = breadcrumb;

    // === レベル1: 問題集選択 ===
    if (!printNav.book) {
      html += '<div class="section-label">問題集を選ぶ</div>';
      html += '<div style="display:grid;gap:10px;margin-bottom:20px">';
      books.forEach(b => {
        const cnt = prints.filter(p => p.book === b).length;
        html += '<div data-action="sel-book" data-val="' + b + '" class="card" style="display:flex;align-items:center;gap:14px;cursor:pointer;padding:16px">'
          + '<div style="width:40px;height:40px;border-radius:10px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📚</div>'
          + '<div style="flex:1"><div style="font-size:15px;font-weight:600">' + b + '</div>'
          + '<div style="font-size:12px;color:var(--text-hint);margin-top:2px">' + cnt + '件登録済み</div></div>'
          + '<div style="color:var(--text-hint);font-size:18px">›</div>'
          + '</div>';
      });
      html += '</div>';

      // プリント追加ボタン
      html += '<button class="btn btn-blue" data-action="show-add" style="width:100%">＋ プリントを追加する</button>';

      // 追加フォーム（非表示状態で保持）
      if (window._showAddForm) {
        html += renderAddForm();
      }
    }

    // === レベル2: 学年選択 ===
    else if (!printNav.grade) {
      html += '<div class="section-label">学年を選ぶ</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px">';
      grades.forEach(g => {
        const cnt = prints.filter(p => p.book === printNav.book && p.grade === g).length;
        html += '<div data-action="sel-grade" data-val="' + g + '" class="card" style="text-align:center;cursor:pointer;padding:16px 8px">'
          + '<div style="font-size:20px;margin-bottom:6px">🎓</div>'
          + '<div style="font-size:14px;font-weight:600">' + g + '</div>'
          + '<div style="font-size:11px;color:var(--text-hint);margin-top:2px">' + cnt + '件</div>'
          + '</div>';
      });
      html += '</div>';
    }

    // === レベル3: 科目選択 ===
    else if (!printNav.subject) {
      const subjects = GRADE_SUBJECTS[printNav.grade] || [];
      html += '<div class="section-label">科目を選ぶ</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">';
      const subjectIcons = {'数学':'📐','英語':'🔤','国語':'📖','理科':'🔬','社会':'🌍','算数':'🔢'};
      subjects.forEach(sub => {
        const cnt = prints.filter(p => p.book === printNav.book && p.grade === printNav.grade && p.subject === sub).length;
        html += '<div data-action="sel-subject" data-val="' + sub + '" class="card" style="text-align:center;cursor:pointer;padding:16px 8px">'
          + '<div style="font-size:24px;margin-bottom:6px">' + (subjectIcons[sub]||'📄') + '</div>'
          + '<div style="font-size:14px;font-weight:600">' + sub + '</div>'
          + '<div style="font-size:11px;color:var(--text-hint);margin-top:2px">' + cnt + '件</div>'
          + '</div>';
      });
      html += '</div>';
    }

    // === レベル4: プリント一覧 ===
    else {
      const filtered = prints.filter(p =>
        p.book === printNav.book &&
        p.grade === printNav.grade &&
        p.subject === printNav.subject
      );

      // 苦手マッチ確認
      let nigates = [];
      if (selectedStudent) {
        const s = students.find(x => x.id === selectedStudent);
        if (s) {
          const skills = await loadSkills(selectedStudent);
          (getUnitsForGrade(printNav.subject, printNav.grade)||[]).forEach(u => {
            if (skills[printNav.subject]?.[u] === 'nigate') nigates.push(u);
          });
        }
      }

      // プリント追加ボタン
      html += '<button class="btn btn-blue" data-action="show-add" style="width:100%;margin-bottom:12px">＋ プリントを追加する</button>';
      if (window._showAddForm) html += renderAddForm();

      if (!filtered.length) {
        html += '<div class="empty">まだプリントが登録されていません</div>';
      } else {
        filtered.forEach(p => {
          const sel = selectedPrints.includes(p.id);
          const units = (window._printUnitsCache||[]).filter(x => x.print_id === p.id).map(x => x.unit);
          const isMatch = nigates.length > 0 && units.some(u => nigates.includes(u));
          html += '<div class="print-card ' + (sel?'selected':'') + '" data-action="toggle-print" data-id="' + p.id + '">'
            + '<div class="pc-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + (sel?'#534AB7':'#888780') + '" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>'
            + '<div style="flex:1;min-width:0">'
            + '<div class="pc-name">' + p.unit + (isMatch ? '<span class="match-badge">苦手一致</span>' : '') + '</div>'
            + '<div class="pc-sub">' + (units.length > 1 ? units.join('・') : '') + '</div>'
            + '</div>'
            + '<button data-action="del-print" data-id="' + p.id + '" style="border:none;background:none;color:var(--text-hint);cursor:pointer;font-size:20px;padding:4px 8px;flex-shrink:0;line-height:1">×</button>'
            + '</div>';
        });
      }

      if (selectedPrints.length) {
        html += '<div class="print-action">'
          + '<div class="print-action-title">' + selectedPrints.length + '件選択中</div>'
          + '<button class="btn btn-purple" data-action="do-print">🖨 印刷する（' + selectedPrints.length + '枚）</button>'
          + '</div>';
      }
    }

    el.innerHTML = html;

    // イベント委任
    el.onclick = async function(e) {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      const action = t.dataset.action;
      if (action === 'nav-root') { printNav = {book:null,grade:null,subject:null}; window._showAddForm=false; await renderPrintTab(); }
      else if (action === 'nav-book') { printNav.grade=null; printNav.subject=null; window._showAddForm=false; await renderPrintTab(); }
      else if (action === 'nav-grade') { printNav.subject=null; window._showAddForm=false; await renderPrintTab(); }
      else if (action === 'sel-book') { printNav.book=t.dataset.val; await renderPrintTab(); }
      else if (action === 'sel-grade') { printNav.grade=t.dataset.val; await renderPrintTab(); }
      else if (action === 'sel-subject') { printNav.subject=t.dataset.val; await renderPrintTab(); }
      else if (action === 'show-add') { window._showAddForm=!window._showAddForm; await renderPrintTab(); }
      else if (action === 'toggle-print') {
        const idx = selectedPrints.indexOf(t.dataset.id);
        if (idx >= 0) selectedPrints.splice(idx,1); else selectedPrints.push(t.dataset.id);
        await renderPrintTab();
      }
      else if (action === 'del-print') {
        e.stopPropagation();
        await sb.from('print_units').delete().eq('print_id', t.dataset.id);
        await sb.from('prints').delete().eq('id', t.dataset.id);
        prints = prints.filter(p => p.id !== t.dataset.id);
        selectedPrints = selectedPrints.filter(x => x !== t.dataset.id);
        toast('削除しました');
        await renderPrintTab();
      }
      else if (action === 'do-print') { await doPrint(); }
      else if (action === 'add-print') { await addPrintFromForm(); }
    };

  } catch(e) {
    console.error('renderPrintTab error:', e);
    el.innerHTML = '<div style="padding:20px;color:var(--red)">エラー: ' + e.message + '</div>';
  }
}

function renderAddForm() {
  const book = printNav.book || '';
  const grade = printNav.grade || '';
  const subject = printNav.subject || '';
  const books = ['ひとつひとつわかりやすく', 'ちびむす'];
  const grades = Object.keys(GRADE_SUBJECTS).filter(g => g.startsWith('中'));
  const subjects = Object.keys(SUBJECT_UNITS);

  return '<div class="card" style="margin-bottom:16px;margin-top:12px">'
    + '<div style="font-size:14px;font-weight:600;margin-bottom:12px">プリントを追加</div>'
    + '<div class="form-grid" style="margin-bottom:8px">'
    + '<select id="pbook"><option value="">問題集</option>' + books.map(b => '<option' + (b===book?' selected':'') + '>' + b + '</option>').join('') + '</select>'
    + '<select id="pgrade"><option value="">学年</option>' + grades.map(g => '<option' + (g===grade?' selected':'') + '>' + g + '</option>').join('') + '</select>'
    + '</div>'
    + '<div class="form-grid" style="margin-bottom:8px">'
    + '<select id="psubject"><option value="">科目</option>' + subjects.map(s => '<option' + (s===subject?' selected':'') + '>' + s + '</option>').join('') + '</select>'
    + '<input type="text" id="punit" placeholder="単元名（例：be動詞）">'
    + '</div>'
    + '<div style="margin-bottom:10px"><div style="font-size:12px;color:var(--text-hint);margin-bottom:6px">PDFまたは画像（省略可）</div>'
    + '<input type="file" id="pfile" accept=".pdf,image/*"></div>'
    + '<button class="btn btn-blue" data-action="add-print">追加する</button>'
    + '</div>';
}

async function addPrintFromForm() {
  const book = document.getElementById('pbook')?.value;
  const grade = document.getElementById('pgrade')?.value;
  const subject = document.getElementById('psubject')?.value;
  const unit = document.getElementById('punit')?.value.trim();
  const file = document.getElementById('pfile')?.files[0];
  if (!book || !grade || !subject || !unit) { toast('全項目を入力してください'); return; }

  toast('追加中...');
  let fileUrl = null, fileName = null;

  if (file) {
    // Supabase Storageにアップロード
    // ファイルパスは英数字のみ（日本語を除去）
    const ext = file.name.split('.').pop().toLowerCase();
    const safeId = Date.now().toString();
    const filePath = safeId + '.' + ext;
    const { data: uploadData, error: uploadError } = await sb.storage.from('prints').upload(filePath, file, { upsert: true });
    if (uploadError) {
      toast('ファイルアップロードエラー: ' + uploadError.message);
      return;
    }
    const { data: urlData } = sb.storage.from('prints').getPublicUrl(filePath);
    fileUrl = urlData.publicUrl;
    fileName = file.name;
  }

  const name = book + ' ' + subject + ' ' + unit;
  const { data: newPrint, error } = await sb.from('prints').insert({ name, subject, unit, grade, book, file_url: fileUrl, file_name: fileName }).select().single();
  if (error) { toast('登録エラー: ' + error.message); return; }

  const unitTags = unit.split(/[,、／・]/).map(u => u.trim()).filter(u => u);
  if (unitTags.length > 0) {
    await sb.from('print_units').insert(unitTags.map(u => ({ print_id: newPrint.id, subject, unit: u })));
  }
  await loadPrints();
  window._showAddForm = false;
  printNav = { book, grade, subject };
  toast('追加しました：' + unit);
  await renderPrintTab();
}


function printCardHtml(p, sel, isMatch) {
  return `<div class="print-card ${sel?'selected':''}" onclick="togglePrint('${p.id}')">
    <div class="pc-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${sel?'#534AB7':'#888780'}" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <div style="flex:1;min-width:0">
      <div class="pc-name">${p.name}${isMatch?'<span class="match-badge">苦手一致</span>':''}</div>
      <div class="pc-sub">${p.book?'<span style="background:#E6F1FB;color:#0C447C;padding:1px 6px;border-radius:8px;font-size:11px;margin-right:4px;font-weight:600;">'+p.book+'</span>':''} ${p.subject||''} ${p.unit?' / '+p.unit:''} ${p.grade?'· '+p.grade:''}</div>
    </div>
    <button onclick="event.stopPropagation();deletePrint('${p.id}')" style="border:none;background:none;color:var(--text-hint);cursor:pointer;font-size:20px;padding:4px 8px;flex-shrink:0;line-height:1">×</button>
  </div>`;
}



function setBookFilter(book) {
  window._filterBook = book;
  renderPrintTab();
}

async function togglePrint(id) {
  const idx = selectedPrints.indexOf(id);
  if (idx >= 0) selectedPrints.splice(idx, 1);
  else selectedPrints.push(id);
  await renderPrintTab();
}

async function deletePrint(id) {
  await sb.from('prints').delete().eq('id', id);
  prints = prints.filter(p => p.id !== id);
  selectedPrints = selectedPrints.filter(x => x !== id);
  toast('削除しました');
  await renderPrintTab();
}

async function doPrint() {
  const targets = prints.filter(p => selectedPrints.includes(p.id));
  await doPrintTargets(targets, selectedStudent, selectedPrints);
  selectedPrints = [];
  await renderPrintTab();
}


// ===== 生徒管理タブ =====
function renderStudentsTab() {
  const el = document.getElementById('tab-students');
  window._newSlotSelected = window._newSlotSelected || {};

  const gradeOpts = Object.keys(GRADE_SUBJECTS).map(g => '<option>' + g + '</option>').join('');

  let html = '<div class="section-label">新しい生徒を追加</div>'
    + '<div class="card">'
    + '<div class="form-grid" style="margin-bottom:8px">'
    + '<input type="text" id="new-name" placeholder="生徒名（例：田中 蓮）">'
    + '<select id="new-grade"><option value="">学年を選ぶ</option>' + gradeOpts + '</select>'
    + '</div>'
    + '<div style="margin-bottom:10px">'
    + '<div class="section-label" style="margin-bottom:6px">コマを選ぶ（複数可）</div>'
    + '<div id="new-slot-grid" style="display:grid;gap:8px">' + buildSlotGrid(window._newSlotSelected) + '</div>'
    + '</div>'
    + '<button class="btn btn-blue" data-action="add">追加する</button>'
    + '</div>';

  html += '<div class="section-label">登録済み生徒（' + students.length + '名）</div>';

  if (!students.length) {
    html += '<div class="empty">まだ生徒が登録されていません</div>';
  } else {
    students.forEach(s => {
      const slots = getSlotsForStudent(s.id);
      const slotText = slots.length
        ? slots.map(c => c.day_of_week + '曜 ' + c.time_slot).join('　')
        : 'コマ未設定';
      html += '<div class="card" style="margin-bottom:10px">'
        + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
        + '<div class="avatar">' + s.name.slice(-1) + '</div>'
        + '<div style="flex:1;min-width:0">'
        + '<div style="font-size:15px;font-weight:600">' + s.name + '</div>'
        + '<div style="font-size:12px;color:var(--text-sub)">' + s.grade + '</div>'
        + '</div>'
        + '<button class="btn btn-red btn-sm" data-action="del" data-id="' + s.id + '">削除</button>'
        + '</div>'
        + '<div style="font-size:12px;color:' + (slots.length ? 'var(--blue-dark)' : 'var(--text-hint)') + ';margin-bottom:8px">'
        + (slots.length ? '📅 ' + slotText : '⚠ ' + slotText)
        + '</div>'
        + '<button class="btn btn-outline btn-sm" data-action="editslot" data-id="' + s.id + '">コマを変更</button>'
        + '</div>';
    });
  }

  el.innerHTML = html;
  el.onclick = async function(e) {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const action = t.dataset.action;
    if (action === 'add') { await addStudent(); return; }
    if (action === 'del') { await deleteStudent(t.dataset.id); return; }
    if (action === 'editslot') { openSlotAssignInStudents(t.dataset.id); return; }
    if (action === 'togglenew') {
      const key = t.dataset.key;
      if (window._newSlotSelected[key]) delete window._newSlotSelected[key];
      else window._newSlotSelected[key] = true;
      const grid = document.getElementById('new-slot-grid');
      if (grid) grid.innerHTML = buildSlotGrid(window._newSlotSelected);
    }
  };
}

function buildSlotGrid(selectedMap) {
  let html = '';
  DAYS.forEach(d => {
    html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
      + '<span style="font-size:12px;font-weight:600;color:var(--text-secondary);min-width:28px">' + d + '曜</span>';
    (TIME_SLOTS[d]||[]).forEach(slot => {
      const key = d + '|' + slot;
      const isActive = selectedMap && selectedMap[key];
      html += '<button type="button" class="filter-btn ' + (isActive ? 'filter-active-blue' : '') + '" style="padding:5px 10px;font-size:12px" data-action="togglenew" data-key="' + key + '">' + slot + '</button>';
    });
    html += '</div>';
  });
  return html;
}


async function openSlotAssignInStudents(studentId) {
  const s = students.find(x => x.id === studentId);
  if (!s) return;
  const el = document.getElementById('tab-students');
  
  function render() {
    const currentSlots = getSlotsForStudent(studentId);
    let html = '<div style="margin-bottom:16px"><button class="btn btn-outline btn-sm" data-action="backtostudents">← 戻る</button></div>';
    html += '<div style="font-size:16px;font-weight:600;margin-bottom:6px">' + s.name + ' のコマを設定</div>';
    html += '<div style="font-size:12px;color:var(--text-hint);margin-bottom:16px">タップでON/OFF（複数選択可）</div>';
    DAYS.forEach(d => {
      html += '<div style="margin-bottom:12px">';
      html += '<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">' + d + '曜日</div>';
      html += '<div style="display:grid;gap:6px">';
      (TIME_SLOTS[d]||[]).forEach(slot => {
        const isActive = currentSlots.some(c => c.day_of_week === d && c.time_slot === slot);
        html += '<button class="filter-btn ' + (isActive ? 'filter-active-blue' : '') + '" style="text-align:left;padding:12px 16px;" data-action="setslot" data-sid="' + studentId + '" data-day="' + d + '" data-slot="' + slot + '">'
          + slot + (isActive ? ' ✓' : '') + '</button>';
      });
      html += '</div></div>';
    });
    el.innerHTML = html;
  }

  render();

  el.onclick = async function(e) {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    if (t.dataset.action === 'backtostudents') {
      el.onclick = null;
      renderStudentsTab();
      return;
    }
    if (t.dataset.action === 'setslot') {
      await toggleClassSlot(t.dataset.sid, t.dataset.day, t.dataset.slot);
      render();
      toast('コマを更新しました');
    }
  };
}


async function addStudent() {
  const name = document.getElementById('new-name').value.trim();
  const grade = document.getElementById('new-grade').value;
  if (!name || !grade) { toast('名前と学年を入力してください'); return; }
  const { data: newStudent, error } = await sb.from('students').insert({ name, grade }).select().single();
  if (error) { toast('エラーが発生しました'); return; }
  await loadStudents();
  // 選択されたコマを登録
  const selected = window._newSlotSelected || {};
  for (const key of Object.keys(selected)) {
    const [day, slot] = key.split('|');
    await sb.from('class_slots').insert({student_id: newStudent.id, day_of_week: day, time_slot: slot});
  }
  await loadClassSlots();
  window._newSlotSelected = {};
  toast('追加しました：' + name);
  renderStudentsTab();
}

async function deleteStudent(id) {
  const s = students.find(x => x.id === id);
  await sb.from('students').delete().eq('id', id);
  students = students.filter(x => x.id !== id);
  if (selectedStudent === id) selectedStudent = null;
  delete skillCache[id];
  toast((s?.name||'生徒') + 'を削除しました');
  renderStudentsTab();
}

// ===== 起動 =====
init();
